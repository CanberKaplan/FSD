<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anı Defteri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
<body class="bg-slate-50 min-h-screen font-sans antialiased text-slate-800 selection:bg-blue-200 selection:text-blue-900">
    
    <!-- Mobil odaklı ana taşıyıcı, kenar boşlukları daraltıldı -->
    <div class="max-w-3xl mx-auto p-3 pb-20">
        
        <!-- Minimalist Tipografik SC Logosu -->
        <header class="flex flex-col items-center justify-center w-full py-10 mb-4 select-none">
            <svg viewBox="0 0 680 480" width="160" role="img" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <clipPath id="top-half">
               <rect x="0" y="0" width="680" height="240"/>
              </clipPath>
              <clipPath id="bottom-half">
               <rect x="0" y="240" width="680" height="240"/>
              </clipPath>
            </defs>
             <text x="360" y="360" font-family="'Playfair Display', Georgia, serif" font-size="380" font-weight="900" font-style="italic" text-anchor="middle" dominant-baseline="middle" fill="none" stroke="#F97316" stroke-width="18" clip-path="url(#bottom-half)">C</text>
             <text x="360" y="360" font-family="'Playfair Display', Georgia, serif" font-size="380" font-weight="900" font-style="italic" text-anchor="middle" dominant-baseline="middle" fill="none" stroke="#F97316" stroke-width="5" clip-path="url(#bottom-half)">C</text>
             <text x="330" y="240" font-family="'Playfair Display', Georgia, serif" font-size="380" font-weight="900" font-style="italic" text-anchor="middle" dominant-baseline="middle" fill="none" stroke="#3B82F6" stroke-width="18">S</text>
            <text x="330" y="240" font-family="'Playfair Display', Georgia, serif" font-size="380" font-weight="900" font-style="italic" text-anchor="middle" dominant-baseline="middle" fill="none" stroke="#3B82F6" stroke-width="5">S</text>
            <text x="360" y="360" font-family="'Playfair Display', Georgia, serif" font-size="380" font-weight="900" font-style="italic" text-anchor="middle" dominant-baseline="middle" fill="none" stroke="#F97316" stroke-width="18" clip-path="url(#top-half)">C</text>
            <text x="360" y="360" font-family="'Playfair Display', Georgia, serif" font-size="380" font-weight="900" font-style="italic" text-anchor="middle" dominant-baseline="middle" fill="none" stroke="#F97316" stroke-width="5" clip-path="url(#top-half)">C</text>
            </svg>
        </header>

        <!-- Home View -->
        <div id="homeView" class="space-y-4 animate-fade-in">
            
            <!-- DİJİTAL ANILAR: Banner mobilde daha ince ayarlandı -->
            <div id="homeHero" class="group relative w-full h-36 sm:h-48 bg-slate-800 rounded-2xl shadow-md flex items-center justify-center border border-slate-700/50 overflow-hidden">
                <div id="slideshowContainer" class="absolute inset-0 w-full h-full"></div>
                <div class="absolute inset-0 bg-gradient-to-t from-slate-900/80 via-slate-900/40 to-transparent z-10"></div>
                <p class="relative z-20 text-white font-bold tracking-[0.3em] sm:tracking-[0.4em] uppercase text-xs sm:text-sm drop-shadow-lg opacity-90 group-hover:opacity-100 transition-opacity">
                    DİJİTAL ANILAR
                </p>
            </div>

            <!-- Alt Kısım: MOBİLDE DE YAN YANA (grid-cols-2) -->
            <div class="grid grid-cols-2 gap-3 sm:gap-4">
                
                <!-- Sol Sütun: Butonlar -->
                <div class="flex flex-col gap-y-3">
                    
                    <button onclick="navigate('Seyahat')" class="group flex items-center justify-between w-full bg-white py-4 px-3 sm:px-5 font-semibold text-slate-700 rounded-xl sm:rounded-2xl border border-slate-100 shadow-sm hover:shadow-md hover:bg-blue-50/50 transition-all active:scale-[0.98]">
                        <div class="flex items-center gap-2.5 sm:gap-4">
                            <span class="w-1.5 h-5 rounded-full bg-blue-500"></span>
                            <span class="tracking-wide text-xs sm:text-sm">SEYAHAT</span>
                        </div>
                    </button>

                    <button onclick="navigate('Yemek')" class="group flex items-center justify-between w-full bg-white py-4 px-3 sm:px-5 font-semibold text-slate-700 rounded-xl sm:rounded-2xl border border-slate-100 shadow-sm hover:shadow-md hover:bg-orange-50/50 transition-all active:scale-[0.98]">
                        <div class="flex items-center gap-2.5 sm:gap-4">
                            <span class="w-1.5 h-5 rounded-full bg-orange-500"></span>
                            <span class="tracking-wide text-xs sm:text-sm">YEMEK</span>
                        </div>
                    </button>

                    <button onclick="navigate('Film')" class="group flex items-center justify-between w-full bg-white py-4 px-3 sm:px-5 font-semibold text-slate-700 rounded-xl sm:rounded-2xl border border-slate-100 shadow-sm hover:shadow-md hover:bg-violet-50/50 transition-all active:scale-[0.98]">
                        <div class="flex items-center gap-2.5 sm:gap-4">
                            <span class="w-1.5 h-5 rounded-full bg-violet-500"></span>
                            <span class="tracking-wide text-xs sm:text-sm">FİLM</span>
                        </div>
                    </button>

                    <button onclick="navigate('Aktivite')" class="group flex items-center justify-between w-full bg-white py-4 px-3 sm:px-5 font-semibold text-slate-700 rounded-xl sm:rounded-2xl border border-slate-100 shadow-sm hover:shadow-md hover:bg-emerald-50/50 transition-all active:scale-[0.98]">
                        <div class="flex items-center gap-2.5 sm:gap-4">
                            <span class="w-1.5 h-5 rounded-full bg-emerald-500"></span>
                            <span class="tracking-wide text-xs sm:text-sm">AKTİVİTE</span>
                        </div>
                    </button>
                    
                </div>

                <!-- Sağ Sütun: Boş Kutu (Mobilde tam hizalı) -->
                <div class="bg-white/60 backdrop-blur-sm rounded-xl sm:rounded-2xl border-2 border-dashed border-slate-200 shadow-sm flex flex-col items-center justify-center p-4 h-full hover:bg-white/80 transition-colors">
                    <div class="w-10 h-10 sm:w-14 sm:h-14 bg-slate-100 rounded-full flex items-center justify-center mb-3">
                        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                    </div>
                    <p class="text-slate-500 text-[10px] sm:text-xs font-medium text-center leading-tight">
                        Yeni modüller için<br>çalışma alanı
                    </p>
                </div>

            </div>
        </div>

        <!-- Folder View -->
        <div id="folderView" class="hidden space-y-5">
            <button onclick="goHome()" class="flex items-center text-slate-500 font-medium text-xs sm:text-sm hover:text-slate-800 transition-colors">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                Geri Dön
            </button>
            <h2 id="folderTitle" class="text-xl sm:text-2xl font-bold text-slate-800 text-center uppercase tracking-widest pb-3 border-b border-slate-200"></h2>
            
            <!-- Mobilde daha net görünsün diye gap-3 -->
            <div id="folderList" class="grid grid-cols-2 gap-3 sm:gap-4"></div>
            
            <div class="bg-white p-4 sm:p-5 rounded-xl shadow-sm border border-slate-100 mt-6">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">YENİ KLASÖR</h3>
                <input type="text" id="newFolderInput" placeholder="Adı (Örn: Londra)" class="w-full p-2.5 sm:p-3 text-sm rounded-lg bg-slate-50 border border-transparent focus:border-slate-300 focus:bg-white mb-2 outline-none transition-all">
                <input type="date" id="newFolderDate" class="w-full p-2.5 sm:p-3 text-sm rounded-lg bg-slate-50 border border-transparent focus:border-slate-300 focus:bg-white mb-3 text-slate-600 outline-none transition-all">
                <button onclick="createFolder()" class="w-full bg-slate-800 text-white text-sm font-semibold py-3 rounded-lg hover:bg-slate-900 shadow transition-all active:scale-[0.98]">Oluştur</button>
            </div>
        </div>

        <!-- Detail View -->
        <div id="detailView" class="hidden space-y-5">
            <button id="backBtn" onclick="goBackFromDetail()" class="flex items-center text-slate-500 font-medium text-xs sm:text-sm hover:text-slate-800 transition-colors">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                Geri
            </button>
            <h1 id="subCategoryTitle" class="text-xl sm:text-2xl font-bold text-center uppercase tracking-widest text-slate-800 pb-3 border-b border-slate-200"></h1>
            
            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm relative overflow-hidden">
                <div class="absolute top-0 right-0 w-24 h-24 bg-slate-50 rounded-bl-full -z-10 opacity-50"></div>
                
                <form id="aniForm" onsubmit="saveAni(event)" class="space-y-5">
                    <input type="hidden" name="kategori" id="formKategori">
                    <input type="hidden" name="sub_kategori" id="formSubKategori">
                    <input type="hidden" name="tarih" id="hiddenTarihInput">
                    
                    <div id="inputGroup" class="space-y-4">
                        <div>
                            <input type="text" name="baslik" id="baslikInput" required placeholder="Başlık" class="w-full border-b-2 border-slate-200 py-1.5 text-sm bg-transparent outline-none focus:border-slate-800 text-slate-700 transition-all">
                        </div>
                        <div>
                            <textarea name="notlar" id="notlarInput" rows="2" placeholder="Notlarınız..." class="w-full border-b-2 border-slate-200 py-1.5 text-sm bg-transparent outline-none focus:border-slate-800 text-slate-700 transition-all resize-none"></textarea>
                        </div>
                    </div>
                    
                    <!-- Puanlama Alanı (Sadece Film ve Yemek için görünür) -->
                    <div id="puanContainer" class="hidden space-y-3 pt-4 border-t border-slate-100">
                        <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Değerlendirme (10 Üzerinden)</h3>
                        <div class="grid grid-cols-2 gap-3">
                            <!-- Canberk'in Puanı -->
                            <div class="bg-blue-50/50 p-3 rounded-xl border border-blue-100/50">
                                <label class="block text-[10px] font-bold text-blue-500 uppercase tracking-wider mb-2">Canberk: <span id="puan1Deger" class="text-blue-700 text-sm">7.0</span></label>
                                <input type="range" id="puan1Input" min="0" max="10" step="0.5" value="7" oninput="document.getElementById('puan1Deger').innerText = parseFloat(this.value).toFixed(1)" class="w-full accent-blue-500 h-1.5 bg-blue-200 rounded-lg appearance-none cursor-pointer">
                            </div>
                            <!-- Sude'nin Puanı -->
                            <div class="bg-orange-50/50 p-3 rounded-xl border border-orange-100/50">
                                <label class="block text-[10px] font-bold text-orange-500 uppercase tracking-wider mb-2">Sude: <span id="puan2Deger" class="text-orange-700 text-sm">7.0</span></label>
                                <input type="range" id="puan2Input" min="0" max="10" step="0.5" value="7" oninput="document.getElementById('puan2Deger').innerText = parseFloat(this.value).toFixed(1)" class="w-full accent-orange-500 h-1.5 bg-orange-200 rounded-lg appearance-none cursor-pointer">
                            </div>
                        </div>
                    </div>

                    <div>
                        <input type="file" name="foto" accept="image/*" class="w-full text-xs text-slate-500 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-slate-100 file:text-slate-700 cursor-pointer border border-dashed border-slate-300 rounded-lg p-1.5 bg-slate-50/50">
                    </div>
                    
                    <button type="submit" id="submitBtn" class="w-full bg-slate-800 text-white text-sm font-semibold py-3 rounded-lg shadow transition-all active:scale-[0.98]">
                        KAYDET
                    </button>
                </form>
            </div>
            
            <div id="aniListesi" class="space-y-4 pb-10"></div>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="hidden fixed inset-0 z-50 bg-slate-900/95 flex items-center justify-center p-2" onclick="closeLightbox()">
        <button class="absolute top-4 right-4 text-white/70 bg-white/10 p-2 rounded-full" onclick="closeLightbox()">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <img id="lightboxImg" class="max-w-full max-h-full object-contain rounded-lg">
    </div>

    <script>
        const bugun = new Date().toISOString().split('T')[0];
        let state = { cat: '', sub: '' };
        const usesFolders = ['Seyahat', 'Aktivite'];

        function getDriveImgUrl(link) {
            if (!link || link === 'NO_IMAGE') return null;
            if (link.includes('drive.google.com/thumbnail')) return link;
            const matchD = link.match(/\/d\/([a-zA-Z0-9_-]+)/);
            if (matchD) return `https://drive.google.com/thumbnail?id=${matchD[1]}&sz=w800`;
            const matchId = link.match(/[?&]id=([a-zA-Z0-9_-]+)/);
            if (matchId) return `https://drive.google.com/thumbnail?id=${matchId[1]}&sz=w800`;
            return link;
        }

        window.onload = () => { initSlideshow(); };

        async function initSlideshow() {
            try {
                const res = await fetch('/api/anilar');
                const data = await res.json();
                const photos = data.filter(a => a.kategori === 'Seyahat' && a.gorsel_link !== 'NO_IMAGE');
                if (photos.length > 0) {
                    const cont = document.getElementById('slideshowContainer');
                    cont.innerHTML = photos.map((p, i) => {
                        const imgUrl = getDriveImgUrl(p.gorsel_link);
                        return `<img src="${imgUrl}" class="absolute inset-0 w-full h-full object-cover transition-opacity duration-1000 ${i === 0 ? 'opacity-100' : 'opacity-0'}">`;
                    }).join('');

                    if (photos.length > 1) {
                        let current = 0;
                        setInterval(() => {
                            const imgs = cont.querySelectorAll('img');
                            imgs[current].classList.replace('opacity-100', 'opacity-0');
                            current = (current + 1) % imgs.length;
                            imgs[current].classList.replace('opacity-0', 'opacity-100');
                        }, 4000);
                    }
                }
            } catch(e) {}
        }

        function navigate(kat) {
            state.cat = kat;
            document.getElementById('homeView').classList.add('hidden');
            if(usesFolders.includes(kat)) {
                document.getElementById('folderView').classList.remove('hidden');
                document.getElementById('folderTitle').innerText = kat;
                loadFolders(kat);
            } else { openFolder('Genel', bugun); }
        }

        function openFolder(sub, dateVal) {
            state.sub = sub;
            document.getElementById('folderView').classList.add('hidden');
            document.getElementById('detailView').classList.remove('hidden');
            
            const inFolder = usesFolders.includes(state.cat);
            const isRated = (state.cat === 'Film' || state.cat === 'Yemek');

            // Başlık gizleme/gösterme
            document.getElementById('inputGroup').classList.toggle('hidden', inFolder);
            document.getElementById('baslikInput').required = !inFolder;
            document.getElementById('baslikInput').value = inFolder ? "Fotoğraf" : "";
            
            // Puanlama alanını göster/gizle
            document.getElementById('puanContainer').classList.toggle('hidden', !isRated);

            // Puanları sıfırla
            document.getElementById('puan1Input').value = "7";
            document.getElementById('puan1Deger').innerText = "7.0";
            document.getElementById('puan2Input').value = "7";
            document.getElementById('puan2Deger').innerText = "7.0";
            
            document.getElementById('formKategori').value = state.cat;
            document.getElementById('formSubKategori').value = sub;
            document.getElementById('hiddenTarihInput').value = dateVal || bugun;
            document.getElementById('subCategoryTitle').innerText = sub;
            
            loadAnilar(state.cat, sub);
        }

        async function loadFolders(kat) {
            const list = document.getElementById('folderList');
            list.innerHTML = '<div class="col-span-full py-6 text-center text-slate-400 text-xs">Yükleniyor...</div>';
            try {
                const res = await fetch('/api/anilar');
                const data = await res.json();
                const folders = [...new Set(data.filter(a => a.kategori === kat).map(a => a.sub_kategori))];
                if (folders.length === 0) {
                    list.innerHTML = '<p class="col-span-full py-6 text-center text-slate-400 text-xs">Klasör bulunamadı.</p>';
                    return;
                }
                list.innerHTML = folders.map(f => `
                    <button onclick="openFolder('${f}', '${bugun}')" class="bg-white rounded-xl shadow-sm border border-slate-100 active:scale-[0.98] text-left p-4">
                        <svg class="w-6 h-6 text-slate-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                        <h3 class="font-bold text-slate-700 text-sm truncate">${f}</h3>
                    </button>
                `).join('');
            } catch(e) {
                list.innerHTML = '<p class="col-span-full py-6 text-center text-red-400 text-xs">Hata oluştu.</p>';
            }
        }

        async function loadAnilar(kat, sub) {
            const list = document.getElementById('aniListesi');
            list.innerHTML = '<div class="py-6 text-center text-slate-400 text-xs">Yükleniyor...</div>';
            try {
                const res = await fetch('/api/anilar');
                const data = await res.json();
                const filtered = data.filter(a => a.kategori === kat && a.sub_kategori === sub);
                
                if (filtered.length === 0) {
                    list.innerHTML = '<div class="text-center py-8"><p class="text-slate-400 text-xs">İlk anınızı ekleyin.</p></div>';
                    return;
                }

                list.innerHTML = filtered.map(ani => {
                    const imgUrl = getDriveImgUrl(ani.gorsel_link);
                    const isRated = (ani.kategori === 'Film' || ani.kategori === 'Yemek');
                    
                    let puanHtml = '';
                    if (isRated && ani.puan && ani.puan !== "0") {
                        if (ani.puan.includes('|')) {
                            // C:8.5|P:9.0 Formatı ayrıştırma
                            const parts = ani.puan.split('|');
                            const cPuan = parts[0] ? parts[0].replace('C:', '').trim() : '0';
                            const pPuan = parts[1] ? parts[1].replace('P:', '').trim() : '0';
                            puanHtml = `
                            <div class="mt-3 flex gap-2">
                                <span class="text-[11px] font-bold text-blue-600 bg-blue-50 border border-blue-100 px-2.5 py-1 rounded-lg shadow-sm flex items-center gap-1">Canberk: ${cPuan} <span class="text-blue-400">★</span></span>
                                <span class="text-[11px] font-bold text-orange-600 bg-orange-50 border border-orange-100 px-2.5 py-1 rounded-lg shadow-sm flex items-center gap-1">Sude: ${pPuan} <span class="text-orange-400">★</span></span>
                            </div>`;
                        } else {
                            // Eski formatı desteklemek için
                            puanHtml = `<div class="mt-3 text-[11px] font-bold text-yellow-600 bg-yellow-50 border border-yellow-100 px-2.5 py-1 rounded-lg w-max shadow-sm">Ortalama Puan: ${ani.puan} ★</div>`;
                        }
                    }

                    return `
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                            ${imgUrl ? `
                                <img src="${imgUrl}" onclick="openLightbox('${imgUrl}')" class="w-full h-48 object-cover rounded-lg mb-3" onerror="this.style.display='none'">
                            ` : ''}
                            <h3 class="font-bold text-slate-800 text-sm sm:text-base">${ani.baslik}</h3>
                            ${ani.notlar ? `<p class="text-slate-600 mt-1 text-xs sm:text-sm">${ani.notlar}</p>` : ''}
                            ${puanHtml}
                            <p class="text-[10px] text-slate-400 mt-3">${ani.tarih}</p>
                        </div>
                    `;
                }).join('');
            } catch(e) {
                list.innerHTML = '<p class="text-center text-red-400 text-xs py-6">Hata oluştu.</p>';
            }
        }

        async function saveAni(event) {
            event.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; 
            btn.innerText = "KAYDEDİLİYOR...";
            
            const formData = new FormData(document.getElementById('aniForm'));
            
            // Eğer kategori Film veya Yemek ise iki puanı birleştir
            if (state.cat === 'Film' || state.cat === 'Yemek') {
                const p1 = document.getElementById('puan1Input').value;
                const p2 = document.getElementById('puan2Input').value;
                formData.set('puan', `C:${p1}|P:${p2}`);
            } else {
                formData.set('puan', '0');
            }

            try {
                const res = await fetch('/api/ani_ekle', { method: 'POST', body: formData });
                if(res.ok) { location.reload(); }
                else {
                    const err = await res.json();
                    alert('Hata: ' + (err.hata || 'Bilinmeyen hata'));
                    btn.disabled = false; btn.innerText = "KAYDET";
                }
            } catch(e) { 
                alert('Sunucuya bağlanılamadı.'); 
                btn.disabled = false; btn.innerText = "KAYDET";
            }
        }

        function createFolder() {
            const name = document.getElementById('newFolderInput').value.trim();
            const d = document.getElementById('newFolderDate').value;
            if(name) openFolder(name, d);
        }

        function goHome() { location.reload(); }
        
        function goBackFromDetail() { 
            document.getElementById('detailView').classList.add('hidden');
            if(usesFolders.includes(state.cat)) {
                document.getElementById('folderView').classList.remove('hidden');
            } else { goHome(); }
        }

        function openLightbox(url) {
            document.getElementById('lightboxImg').src = url;
            document.getElementById('lightbox').classList.remove('hidden');
        }

        function closeLightbox() { 
            document.getElementById('lightbox').classList.add('hidden'); 
        }
    </script>
</body>
</html>
