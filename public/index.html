<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijital Anı Defterim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> .hidden { display: none; } </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-purple-800 to-orange-500 min-h-screen text-white p-4 font-sans">
    <div class="max-w-md mx-auto space-y-6 pb-20">
        <!-- ANA SAYFA -->
        <div id="homeView">
            <div class="w-full h-56 bg-white/10 backdrop-blur-md rounded-2xl shadow-2xl flex items-center justify-center border border-white/20 mb-8 overflow-hidden relative">
                <p class="text-white text-xl font-bold z-10 tracking-widest">DİJİTAL ANI DEFTERİM</p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="navigate('Seyahat')" class="h-28 bg-pink-600 rounded-2xl shadow-lg font-bold flex flex-col items-center justify-center">✈️ SEYAHAT</button>
                <button onclick="navigate('Yemek')" class="h-28 bg-blue-600 rounded-2xl shadow-lg font-bold flex flex-col items-center justify-center">🍽️ YEMEK</button>
                <button onclick="navigate('Film')" class="h-28 bg-yellow-400 text-indigo-900 rounded-2xl shadow-lg font-bold flex flex-col items-center justify-center">🎬 FİLM</button>
                <button onclick="navigate('Aktivite')" class="h-28 bg-green-600 rounded-2xl shadow-lg font-bold flex flex-col items-center justify-center">🏃‍♂️ AKTİVİTE</button>
            </div>
        </div>

        <!-- DETAY SAYFASI -->
        <div id="detailView" class="hidden space-y-8">
            <button onclick="goHome()" class="bg-white/10 px-4 py-2 rounded-full font-bold">⬅️ Geri</button>
            <h1 id="categoryTitle" class="text-3xl font-black text-center uppercase tracking-widest"></h1>
            
            <div class="bg-white/10 backdrop-blur-md p-6 rounded-3xl border border-white/20">
                <form id="aniForm" onsubmit="saveAni(event)" class="space-y-4">
                    <input type="text" name="baslik" required placeholder="Başlık" class="w-full bg-black/20 rounded-xl p-3">
                    <input type="date" name="tarih" id="tarihInput" required class="w-full bg-black/20 rounded-xl p-3 [color-scheme:dark]">
                    <textarea name="notlar" rows="2" placeholder="Notlar..." class="w-full bg-black/20 rounded-xl p-3"></textarea>
                    
                    <label class="block text-sm">Fotoğraf (İsteğe Bağlı)</label>
                    <input type="file" name="foto" accept="image/*" class="w-full bg-black/20 rounded-xl p-2 file:bg-white file:rounded-full file:border-0 file:px-4">
                    
                    <div id="puanContainer" class="hidden space-y-2">
                        <label class="text-sm">Puan: <span id="puanDeger" class="text-yellow-400 font-bold">0.0</span></label>
                        <input type="range" name="puan" min="0" max="5" step="0.5" value="0" oninput="document.getElementById('puanDeger').innerText = parseFloat(this.value).toFixed(1)" class="w-full accent-yellow-400">
                    </div>
                    <button type="submit" id="submitBtn" class="w-full bg-white text-indigo-900 font-bold py-3 rounded-xl">KAYDET</button>
                </form>
            </div>
            <div id="aniListesi" class="space-y-4"></div>
        </div>
    </div>

    <script>
        document.getElementById('tarihInput').value = new Date().toISOString().split('T')[0];
        let currentCategory = '';
        function navigate(kat) {
            currentCategory = kat;
            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('detailView').classList.remove('hidden');
            document.getElementById('categoryTitle').innerText = kat;
            document.getElementById('puanContainer').classList.toggle('hidden', kat !== 'Film' && kat !== 'Yemek');
            loadAnilar(kat);
        }
        function goHome() {
            document.getElementById('detailView').classList.add('hidden');
            document.getElementById('homeView').classList.remove('hidden');
        }
        function renderStars(puan) {
            const p = parseFloat(puan);
            let html = '';
            for(let i=1; i<=5; i++) {
                if(i <= p) html += '★'; else if(i - 0.5 <= p) html += '✬'; else html += '☆';
            }
            return html;
        }
        async function loadAnilar(kat) {
            const list = document.getElementById('aniListesi');
            list.innerHTML = 'Yükleniyor...';
            try {
                const res = await fetch(window.location.origin + '/api/anilar');
                const data = await res.json();
                const filtered = data.filter(a => a.kategori === kat);
                list.innerHTML = filtered.length ? '' : '<p class="text-center opacity-50">Henüz anı yok.</p>';
                filtered.forEach(ani => {
                    const isRated = (ani.kategori === 'Film' || ani.kategori === 'Yemek');
                    const imgHtml = ani.gorsel_link !== "NO_IMAGE" ? `<img src="${ani.gorsel_link}" class="w-full h-32 object-cover rounded-xl mb-2">` : '';
                    list.innerHTML += `
                    <div class="bg-white/10 p-4 rounded-2xl border border-white/20">
                        ${imgHtml}
                        <h3 class="font-bold text-lg">${ani.baslik}</h3>
                        <p class="text-xs opacity-60 mb-1">${ani.tarih}</p>
                        ${isRated ? `<div class="text-yellow-400 mb-1">${renderStars(ani.puan)}</div>` : ''}
                        <p class="text-sm opacity-80">${ani.notlar}</p>
                    </div>`;
                });
            } catch(e) { list.innerHTML = '<p class="text-red-300">Hata oluştu.</p>'; }
        }
        async function saveAni(event) {
            event.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "⏳ KAYDEDİLİYOR...";
            const formData = new FormData(document.getElementById('aniForm'));
            formData.append('kategori', currentCategory);
            try {
                const res = await fetch(window.location.origin + '/api/ani_ekle', { method: 'POST', body: formData });
                if (res.ok) { alert('Anı eklendi!'); document.getElementById('aniForm').reset(); loadAnilar(currentCategory); }
                else throw new Error('Hata');
            } catch(e) { alert('Hata oluştu.'); }
            btn.disabled = false; btn.innerText = "KAYDET";
        }
    </script>
</body>
</html>
