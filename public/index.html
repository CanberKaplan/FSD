<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anı Defteri</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#dbe4e6] min-h-screen font-sans antialiased">
    
    <!-- Ana Konteyner -->
    <div class="max-w-md mx-auto p-4 pb-20">
        
        <!-- LOGO ALANI -->
        <header class="flex justify-center py-6">
            <img src="logo_son.svg" alt="Logo" class="h-32 w-auto object-contain scale-[4.5] transform">
        </header>

        <!-- 1. ANA SAYFA (Kategoriler) -->
        <div id="homeView">
            <div class="w-full h-48 bg-slate-800 rounded-2xl shadow-lg flex items-center justify-center border border-slate-700 mb-8 overflow-hidden">
                <p class="text-white/80 font-medium tracking-[0.2em] uppercase text-sm">Dijital Anılar</p>
            </div>
            
            <div class="flex flex-col gap-y-4">
                <button onclick="navigate('Seyahat')" class="w-full bg-white py-6 font-bold text-slate-700 rounded-xl border-l-8 border-blue-500 shadow-sm hover:shadow-md transition-all active:scale-[0.98]">SEYAHAT</button>
                <button onclick="navigate('Yemek')" class="w-full bg-white py-6 font-bold text-slate-700 rounded-xl border-l-8 border-orange-500 shadow-sm hover:shadow-md transition-all active:scale-[0.98]">YEMEK</button>
                <button onclick="navigate('Film')" class="w-full bg-white py-6 font-bold text-slate-700 rounded-xl border-l-8 border-violet-600 shadow-sm hover:shadow-md transition-all active:scale-[0.98]">FİLM</button>
                <button onclick="navigate('Aktivite')" class="w-full bg-white py-6 font-bold text-slate-700 rounded-xl border-l-8 border-emerald-500 shadow-sm hover:shadow-md transition-all active:scale-[0.98]">AKTİVİTE</button>
            </div>
        </div>

        <!-- 2. KLASÖR SEÇİMİ (Sadece Seyahat ve Aktivite için) -->
        <div id="folderView" class="hidden space-y-6">
            <button onclick="goHome()" class="text-slate-500 font-semibold text-sm hover:text-slate-800 transition-all">← Kategorilere Dön</button>
            <h2 id="folderTitle" class="text-xl font-bold text-slate-800 text-center uppercase tracking-widest"></h2>
            
            <div id="folderList" class="grid grid-cols-2 gap-4">
                <!-- Klasörler JS ile buraya eklenecek -->
            </div>

            <div class="bg-white/50 p-4 rounded-xl mt-6">
                <input type="text" id="newFolderInput" placeholder="Yeni Klasör Adı (Örn: Londra)" class="w-full p-3 rounded-lg border border-slate-200 mb-2">
                <button onclick="createFolder()" class="w-full bg-slate-700 text-white font-bold py-2 rounded-lg hover:bg-slate-800 transition-all active:scale-[0.98]">Klasör Oluştur</button>
            </div>
        </div>

        <!-- 3. ANILAR (Detay ve Form) -->
        <div id="detailView" class="hidden space-y-6">
            <button id="backBtn" onclick="goBackFromDetail()" class="text-slate-500 font-semibold text-sm hover:text-slate-800 transition-all"></button>
            <h1 id="subCategoryTitle" class="text-xl font-bold text-center uppercase tracking-widest text-slate-800"></h1>
            
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                <form id="aniForm" onsubmit="saveAni(event)" class="space-y-4">
                    <input type="hidden" name="kategori" id="formKategori">
                    <input type="hidden" name="sub_kategori" id="formSubKategori">
                    
                    <!-- Başlık Alanı (Seyahat ve Aktivite'de gizlenecek) -->
                    <div id="baslikContainer">
                        <input type="text" name="baslik" id="baslikInput" placeholder="Anı Başlığı (Örn: Eyfel Kulesi Gezisi)" class="w-full border-b border-slate-300 py-2 bg-transparent outline-none focus:border-slate-800 transition-all font-medium">
                    </div>
                    
                    <input type="date" name="tarih" id="tarihInput" required class="w-full border-b border-slate-300 py-2 bg-transparent outline-none focus:border-slate-800 transition-all text-slate-500">
                    <textarea name="notlar" rows="2" placeholder="Notlar..." class="w-full border-b border-slate-300 py-2 bg-transparent outline-none focus:border-slate-800 transition-all"></textarea>
                    
                    <div class="pt-2">
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Fotoğraf (İsteğe Bağlı)</label>
                        <input type="file" name="foto" accept="image/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-slate-100 file:text-slate-700 hover:file:bg-slate-200 transition-all cursor-pointer">
                    </div>
                    
                    <!-- Puanlama sadece Film ve Yemek için görünür -->
                    <div id="puanContainer" class="hidden space-y-2 pt-2">
                        <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Puan: <span id="puanDeger" class="text-slate-800 font-bold">0.0</span></label>
                        <input type="range" name="puan" min="0" max="5" step="0.5" value="0" oninput="document.getElementById('puanDeger').innerText = parseFloat(this.value).toFixed(1)" class="w-full accent-slate-800 h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer">
                    </div>
                    
                    <button type="submit" id="submitBtn" class="w-full bg-slate-800 text-white font-bold py-3 rounded-xl hover:bg-slate-900 transition-all active:scale-[0.98] mt-4 shadow-lg">KAYDET</button>
                </form>
            </div>
            <div id="aniListesi" class="space-y-4"></div>
        </div>
    </div>

    <script>
        document.getElementById('tarihInput').value = new Date().toISOString().split('T')[0];
        let state = { cat: '', sub: '' };
        
        // Hangi kategorilerin klasör kullanacağını belirliyoruz
        const usesFolders = ['Seyahat', 'Aktivite'];

        function navigate(kat) {
            state.cat = kat;
            document.getElementById('homeView').classList.add('hidden');
            
            // Puanlama görünürlüğünü ayarla
            document.getElementById('puanContainer').classList.toggle('hidden', kat !== 'Film' && kat !== 'Yemek');

            if (usesFolders.includes(kat)) {
                // Klasörlü kategori ise klasör ekranını aç
                document.getElementById('folderView').classList.remove('hidden');
                document.getElementById('folderTitle').innerText = kat + " KLASÖRLERİ";
                loadFolders(kat);
            } else {
                // Klasörsüz kategori (Yemek, Film) ise doğrudan anı formunu aç
                openFolder('Genel'); // Varsayılan olarak 'Genel' klasörüne kaydet
            }
        }

        async function loadFolders(kat) {
            const list = document.getElementById('folderList');
            list.innerHTML = '<div class="col-span-2 text-center text-slate-500 text-sm">Yükleniyor...</div>';
            try {
                const res = await fetch('/api/anilar');
                const data = await res.json();
                
                // O kategoriye ait benzersiz klasör (sub_kategori) isimlerini bul
                const folders = [...new Set(data.filter(a => a.kategori === kat).map(a => a.sub_kategori))];
                
                if (folders.length === 0) {
                    list.innerHTML = '<div class="col-span-2 text-center text-slate-500 text-sm">Henüz klasör yok.</div>';
                } else {
                    list.innerHTML = folders.map(f => 
                        `<button onclick="openFolder('${f}')" class="p-4 bg-white rounded-xl shadow border border-slate-200 font-bold text-slate-700 hover:bg-slate-50 transition-all truncate">${f}</button>`
                    ).join('');
                }
            } catch(e) {
                list.innerHTML = '<div class="col-span-2 text-center text-red-500 text-sm">Klasörler yüklenemedi.</div>';
            }
        }

        function createFolder() {
            const input = document.getElementById('newFolderInput');
            const name = input.value.trim();
            if (name) {
                // Klasör oluşturulduğunda doğrudan içine gir (input'u temizle)
                input.value = '';
                openFolder(name);
            }
        }

        function openFolder(sub) {
            state.sub = sub;
            document.getElementById('folderView').classList.add('hidden');
            document.getElementById('detailView').classList.remove('hidden');
            
            // Başlık ve form verilerini ayarla
            if (usesFolders.includes(state.cat)) {
                document.getElementById('subCategoryTitle').innerText = `${state.cat} > ${sub}`;
                document.getElementById('backBtn').innerText = "← Klasörlere Dön";
                
                // Klasör içi fotoğraflarda başlık sormaya gerek yok
                document.getElementById('baslikContainer').classList.add('hidden');
                document.getElementById('baslikInput').required = false;
                document.getElementById('baslikInput').value = '';
            } else {
                document.getElementById('subCategoryTitle').innerText = state.cat;
                document.getElementById('backBtn').innerText = "← Kategorilere Dön";
                
                // Yemek/Film için Başlık (Örn: Restoran Adı) zorunlu olmalı
                document.getElementById('baslikContainer').classList.remove('hidden');
                document.getElementById('baslikInput').required = true;
            }
            
            document.getElementById('formKategori').value = state.cat;
            document.getElementById('formSubKategori').value = sub;
            
            loadAnilar(state.cat, sub);
        }

        function goHome() {
            document.getElementById('folderView').classList.add('hidden');
            document.getElementById('detailView').classList.add('hidden');
            document.getElementById('homeView').classList.remove('hidden');
        }

        function goBackFromDetail() {
            if (usesFolders.includes(state.cat)) {
                // Seyahat/Aktivite ise klasör listesine dön
                document.getElementById('detailView').classList.add('hidden');
                document.getElementById('folderView').classList.remove('hidden');
                loadFolders(state.cat); // Klasör listesini güncelle
            } else {
                // Yemek/Film ise doğrudan ana sayfaya dön
                goHome();
            }
        }

        function renderStars(puan) {
            const p = parseFloat(puan);
            let html = '';
            for(let i=1; i<=5; i++) {
                if(i <= p) html += '★'; else if(i - 0.5 <= p) html += '✬'; else html += '☆';
            }
            return html;
        }

        async function loadAnilar(kat, sub) {
            const list = document.getElementById('aniListesi');
            list.innerHTML = '<div class="text-center text-slate-500 text-sm py-4">Yükleniyor...</div>';
            try {
                const res = await fetch('/api/anilar');
                const data = await res.json();
                
                // Hem Kategori hem de Klasör (Sub-kategori) ismine göre filtrele
                const filtered = data.filter(a => a.kategori === kat && a.sub_kategori === sub);
                
                list.innerHTML = filtered.length ? '' : '<div class="text-center text-slate-500 text-sm py-4">Bu alanda henüz anı yok.</div>';
                
                filtered.forEach(ani => {
                    const isRated = (ani.kategori === 'Film' || ani.kategori === 'Yemek');
                    const imgHtml = ani.gorsel_link !== "NO_IMAGE" ? `<img src="${ani.gorsel_link}" class="w-full h-48 object-cover rounded-xl mb-3 shadow-sm">` : '';
                    
                    // Eğer başlık boş bırakılmışsa (Seyahat klasörü içiyse) h3 etiketini hiç ekleme
                    const baslikHtml = (ani.baslik && ani.baslik.trim() !== "") ? `<h3 class="font-bold text-slate-800 text-lg mb-1">${ani.baslik}</h3>` : '';
                    
                    list.innerHTML += `
                    <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm transition-all hover:shadow-md">
                        ${imgHtml}
                        ${baslikHtml}
                        <p class="text-xs text-slate-500 mb-2">${ani.tarih}</p>
                        ${isRated ? `<div class="text-yellow-500 mb-2 text-lg">${renderStars(ani.puan)}</div>` : ''}
                        <p class="text-sm text-slate-600 leading-relaxed">${ani.notlar}</p>
                    </div>`;
                });
            } catch(e) { list.innerHTML = '<div class="text-center text-red-500 text-sm py-4">Anılar yüklenirken hata oluştu.</div>'; }
        }

        async function saveAni(event) {
            event.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; 
            btn.innerText = "KAYDEDİLİYOR...";
            
            const formData = new FormData(document.getElementById('aniForm'));
            
            try {
                const res = await fetch('/api/ani_ekle', { method: 'POST', body: formData });
                if (res.ok) { 
                    alert('Anı başarıyla kaydedildi!'); 
                    
                    // Formu temizle ama kategori bilgilerini tut
                    document.getElementById('aniForm').reset(); 
                    document.getElementById('tarihInput').value = new Date().toISOString().split('T')[0];
                    document.getElementById('formKategori').value = state.cat;
                    document.getElementById('formSubKategori').value = state.sub;
                    document.getElementById('puanDeger').innerText = '0.0';
                    
                    // Listeyi Yenile
                    loadAnilar(state.cat, state.sub); 
                } else {
                    throw new Error('Hata');
                }
            } catch(e) { 
                alert('Bir sorun oluştu, lütfen tekrar dene.'); 
            }
            
            btn.disabled = false; 
            btn.innerText = "KAYDET";
        }
    </script>
</body>
</html>
